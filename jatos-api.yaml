openapi: 3.0.3
info:
  title: JATOS API
  description: This is the JATOS API specification using OpenAPI.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.1.0
externalDocs:
  description: Find out more about JATOS
  url: https://www.jatos.org
servers:
  - url: http://localhost:9000
  - url: https://cortex.jatos.org
tags:
  - name: admin
    description: Status, user and token management
  - name: study
    description: Study management endpoints
  - name: study-runs
    description: Batches, groups, sessions, and study code operations
  - name: results
    description: Result export, retrieval, and deletion

paths:
  /jatos/api/v1/admin/status:
    get:
      summary: Get the status of your JATOS (for admin tokens only)
      tags: [ admin ]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeAdminStatus'
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"

  /jatos/api/v1/admin/token:
    get:
      summary: Get details of the token used in this request
      tags: [ admin ]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeApiTokenMetadata'
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"

  /jatos/api/v1/admin/logs/{filename}:
    get:
      summary: Get a log file (application logs - not study logs; admin tokens only)
      tags: [ admin ]
      parameters:
        - in: path
          name: filename
          required: true
          schema:
            type: string
          description: >-
            Filename of the log file (e.g. application.log, loader.log,
            update.log)
      responses:
        '200':
          description: Success
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"

  /jatos/api/v1/users:
    get:
      summary: Get all users (admin tokens only)
      tags: [ admin ]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeUserList'
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
    post:
      summary: Create a new user (admin tokens only)
      tags: [ admin ]
      requestBody:
        description: A JSON object containing the new user's properties
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeUser'
        "400":
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"

  /jatos/api/v1/users/{id}:
    head:
      summary: Check whether a user exists (admin tokens only)
      tags: [ admin ]
      parameters:
        - in: path
          name: id
          description: The user's ID to check
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204':
          description: User exists
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found
    get:
      summary: Get a user (admin or self)
      tags: [ admin ]
      parameters:
        - in: path
          name: id
          required: true
          description: The user's ID to get
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeUser'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found
    patch:
      summary: Update a user (admin or self)
      tags: [ admin ]
      parameters:
        - in: path
          name: id
          description: The user's ID to update
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeUser'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found
    delete:
      summary: Delete a user (admin or self; cannot delete admins)
      tags: [ admin ]
      parameters:
        - in: path
          name: id
          description: The user's ID to delete
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSuccessWithMessage'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found

  /jatos/api/v1/users/{id}/tokens:
    post:
      summary: Generate an API token for a user (admin or self)
      tags: [ admin ]
      parameters:
        - in: path
          name: id
          description: The user's ID for which the token should be generated
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
              required: [ name ]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeGeneratedApiToken'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
    get:
      summary: List API token metadata for a user (admin or self)
      tags: [ admin ]
      parameters:
        - in: path
          name: id
          description: The user ID for which the tokens should be listed
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeApiTokenMetadataList'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"

  /jatos/api/v1/tokens/{id}:
    get:
      summary: Get API token metadata by token id (admin or self)
      tags: [ admin ]
      parameters:
        - in: path
          name: id
          description: The token ID for which the metadata should be retrieved
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeApiTokenMetadata'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      summary: Activate/deactivate an API token (admin or self)
      tags: [ admin ]
      parameters:
        - in: path
          name: id
          description: The token ID for which the `active` flag should be toggled
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                active: { type: boolean }
              required: [ active ]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeTokenActiveToggled'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      summary: Delete an API token (admin or self)
      tags: [ admin ]
      parameters:
        - in: path
          name: id
          description: The token ID for which the token should be deleted
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSuccessWithMessage'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /jatos/api/v1/study:
    post:
      deprecated: true
      summary: Deprecated - use "POST /jatos/api/v1/studies" instead
      tags: [ study ]
      responses:
        '201':
          description: Study created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeStudy'

  /jatos/api/v1/studies/create:
    post:
      deprecated: true
      summary: Deprecated - use "POST /jatos/api/v1/studies" instead
      tags: [ study ]
      responses:
        '201':
          description: Study created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeStudy'

  /jatos/api/v1/studies:
    post:
      summary: Import or create a study
      description: |
        Imports a JATOS study archive or creates a new study from scratch.
        The endpoint's behavior is determined by the **Content-Type** header.
        ---

        ### 1. Import Study Archive
        Upload a `.jzip` file.
        * **Supported Content-Types:** `multipart/form-data`, `application/zip`, or `application/octet-stream`.
        * **UUID Conflicts:** If a study with the same UUID already exists,
        behavior is controlled by query parameters (e.g., whether to overwrite
        or keep existing properties and assets).
        
        ### 2. Create Study
        Initialize a new study using JSON containing the study properties.
        * **Supported Content-Type:** `application/json`.
        * **Request Body:** Must contain a JSON object defining the study's properties.
      tags: [ study ]
      parameters:
        - in: query
          name: keepProperties
          required: false
          schema:
            type: boolean
            default: false
          description: >-
            If the study exists already in JATOS, should the current properties
            be kept? Default is `false` (properties are overwritten by default).
            If `true` the current properties are kept. If the study doesn't
            already exist this parameter has no effect.
        - in: query
          name: keepAssets
          required: false
          schema:
            type: boolean
            default: false
          description: >-
            If the study exists already in JATOS, should the current assets
            directory be kept? Default is `false` (assets are overwritten by
            default). If the study doesn't already exist this parameter has no
            effect.
        - in: query
          name: keepCurrentAssetsName
          required: false
          schema:
            type: boolean
            default: false
          description: >-
            If the assets are going to be overwritten (`keepAssets=false`), this
            flag indicates if the assets directory name is taken from the
            current or the uploaded one. In the common case that both names are
            the same this has no effect. But if the current asset directory name
            is different from the uploaded one a `keepCurrentAssetsName=true`
            indicates that the name of the currently installed assets directory
            should be kept. A `false` indicates that the name should be taken
            from the uploaded one. Default is `false`.
        - in: query
          name: renameAssets
          required: false
          schema:
            type: boolean
            default: true
          description: >-
            If the specified study assets directory already exists in JATOS and
            is associated with a different study, it cannot be overwritten. To
            handle this case, you can set `renameAssets=true`. JATOS will then
            automatically rename the assets directory by appending a numeric
            suffix to the original name (for example, `assets_1`, `assets_2`,
            etc.). If `renameAssets=false`, the import will fail and the API
            will return HTTP 403 (Forbidden). Default is `true`.
      requestBody:
        description: >-
          Either a JSON object containing study properties (create) or
          a JATOS study archive upload (.jzip).
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudyCreate'
          multipart/form-data:
            schema:
              type: object
              properties:
                study:
                  type: string
                  format: binary
              required: [ study ]
            encoding:
              study:
                contentType: application/zip
          application/zip:
            schema:
              type: string
              format: binary
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Study overwritten successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeStudy'
        '201':
          description: Study created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeStudy'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '415':
          description: Wrong 'Content-Type' header

  /jatos/api/v1/studies/{id}:
    head:
      summary: Check whether a study exists (admin tokens only)
      tags: [ study ]
      parameters:
        - $ref: '#/components/parameters/StudyIdOrUuidParameter'
      responses:
        '204':
          description: Study exists
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    get:
      summary: Export a study
      description: >-
        Export a study by specifying its ID or UUID. The exported study will be in the
        JATOS study archive file format, packed as ZIP.
      tags: [ study ]
      parameters:
        - $ref: '#/components/parameters/StudyIdOrUuidParameter'
      responses:
        '200':
          description: Success
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      summary: Delete a study
      description: >-
        Delete a study (including its components, batches, study links,
        study assets and all result data and files).
      tags: [ study ]
      parameters:
        - $ref: '#/components/parameters/StudyIdOrUuidParameter'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSuccessWithMessage'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /jatos/api/v1/studies/{id}/properties:
    get:
      summary: Get study properties
      description: |
        Returns the properties of a study identified by its ID or UUID.
        
        Set `withComponentProperties=true` to include component properties. Otherwise, only the ID and UUID of each component are returned.
        
        Set `withBatchProperties=true` to include batch properties. Otherwise, only the ID and UUID of each batch are returned.
      tags: [ study ]
      parameters:
        - $ref: '#/components/parameters/StudyIdOrUuidParameter'
        - in: query
          name: withComponentProperties
          schema:
            type: boolean
            default: false
          description: >-
            Flag, if set to `true` the data will additionally contain the
            properties of the study's component.
        - in: query
          name: withBatchProperties
          schema:
            type: boolean
            default: false
          description: >-
            Flag, if set to `true` the data will additionally contain the
            properties of the batches that belong to this study.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeStudy'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      summary: Update study properties
      description: >-
        Regular users may update only studies they are a member of.
        Admins may update only the `active` flag of any study.
      tags: [ study ]
      parameters:
        - $ref: '#/components/parameters/StudyIdOrUuidParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/StudyPropertiesUpdate'
                - $ref: '#/components/schemas/StudyPropertiesUpdateActiveOnly'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiEnvelopeStudy'
                  - $ref: '#/components/schemas/ApiEnvelopeStudyActiveToggled'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /jatos/api/v1/studies/properties:
    get:
      summary: Get all study properties that are accessible to the user
      description: >-
        The properties of the study's components can be included by setting the
        flag `withComponentProperties`. The batch properties can be included by
        setting the flag `withBatchProperties`.
      tags: [ study ]
      parameters:
        - in: query
          name: withComponentProperties
          schema:
            type: boolean
            default: false
          description: >-
            Flag, if set to `true` the data will additionally contain the
            properties of the study's component.
        - in: query
          name: withBatchProperties
          schema:
            type: boolean
            default: false
          description: >-
            Flag, if set to `true` the data will additionally contain the
            properties of the batches that belong to this study.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeStudyList'
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"

  /jatos/api/v1/studies/{id}/assets/structure:
    get:
      summary: Returns the directory structure of a study assets directory in JSON.
      description: |
        Each entry represents a file or directory with the following fields:
        * `name` – name of the file or directory
        * `path` – path relative to the study assets directory
        * `type` – `file` or `directory`
        * `creation` – creation timestamp
        * `lastModified` – last modification timestamp
        * `size` – file size in bytes
        * `checksum` – Adler-32 checksum (files only)
      tags: [ study ]
      parameters:
        - $ref: '#/components/parameters/StudyIdOrUuidParameter'
        - in: query
          name: flatten
          schema:
            type: boolean
            default: false
          description: >-
            Flag, if set to `true` the returned JSON will be a flat list of
            files (no tree, no directories). If `false`, the returned JSON
            will have tree-like structure and include directories. Default
            is `false`.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeStudyAssetsStructure'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /jatos/api/v1/studies/{id}/assets/{filepath}:
    get:
      summary: Download a file from the study assets
      tags: [ study ]
      parameters:
        - $ref: '#/components/parameters/StudyIdOrUuidParameter'
        - in: path
          name: filepath
          required: true
          allowReserved: true
          schema:
            type: string
          description: >-
            Path to the file in the study assets directory. This endpoint
            supports nested paths (subdirectories). Because OpenAPI path
            parameters are typically treated as a single path segment by
            tooling, clients should URL-encode slashes in `filepath`
            (encode `/` as `%2F`) when calling this endpoint. Directories
            cannot be downloaded.
          examples:
            top-level:
              value: logo.png
              summary: Get a file
              description: Get a top-level file
            nested-url-encoded:
              value: images%2Flogo.png
              summary: Get a file from a subdirectory (URL-encoded)
      responses:
        '200':
          description: Success
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    post:
      summary: Upload a file to the study assets
      tags: [ study ]
      parameters:
        - $ref: '#/components/parameters/StudyIdOrUuidParameter'
        - in: path
          name: filepath
          required: true
          allowReserved: true
          schema:
            type: string
          description: >-
            Target path in the study assets directory. This endpoint supports
            nested paths (subdirectories). Clients should URL-encode slashes
            in `filepath` (encode `/` as `%2F`) when calling this endpoint
            via OpenAPI-generated clients. If `filepath` is just '.', the file
            will be saved at the top-level of the study assets directory.
            Non-existing subdirectories will be created. Existing files will
            be overwritten.
          examples:
            top-level:
              value: .
              summary: Save in the top-level of the study assets directory
            nested-dir-url-encoded:
              value: images%2F
              summary: Save in a subdirectory (URL-encoded)
            nested-rename-url-encoded:
              value: images%2FnewFilename.png
              summary: Save in a subdirectory and rename (URL-encoded)
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
          multipart/form-data:
            schema:
              type: object
              properties:
                studyAssetsFile:
                  type: string
                  format: binary
              required: [ studyAssetsFile ]
      responses:
        '200':
          description: File overwritten successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSuccessWithMessage'
        '201':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSuccessWithMessage'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        '404':
          $ref: "#/components/responses/NotFoundError"
    delete:
      summary: Delete a file from the study assets
      tags: [ study ]
      parameters:
        - $ref: '#/components/parameters/StudyIdOrUuidParameter'
        - in: path
          name: filepath
          required: true
          allowReserved: true
          schema:
            type: string
          description: >-
            Path to the file in the study assets directory to delete. This
            endpoint supports nested paths (subdirectories). Clients should
            URL-encode slashes in `filepath` (encode `/` as `%2F`) when
            calling this endpoint via OpenAPI-generated clients. Directories
            won't be deleted.
          examples:
            top-level:
              value: logo.png
              summary: Delete a top-level file
            nested-url-encoded:
              value: images%2Flogo.png
              summary: Delete a file in a subdirectory (URL-encoded)
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSuccessWithMessage'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /jatos/api/v1/studies/{id}/assets:
    post:
      summary: Upload a file to the study assets
      description: >-
