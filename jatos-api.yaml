  /jatos/api/v1/batches/{id}/session:
    get:
      summary: Get the batch session data
      tags: [ study-runs ]
      parameters:
        - $ref: '#/components/parameters/BatchIdOrUuidParameter'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeBatchOrGroupSession'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      summary: Update the batch session data
      description: >-
        Updates the batch session data with optimistic concurrency control via `version`.
        If the provided `version` is not the latest one, the request is rejected.
      tags: [ study-runs ]
      parameters:
        - $ref: '#/components/parameters/BatchIdOrUuidParameter'
        - in: query
          name: version
          required: false
          schema:
            type: integer
            format: int64
          description: >-
            Session version for optimistic locking. If omitted, the server uses the current version.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              description: Arbitrary JSON object stored as the batch session.
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Success (returns the new version)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSessionVersion'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

