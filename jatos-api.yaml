  /jatos/api/v1/results:
    post:
      summary: Get results (combined with metadata, data, and files)
      description: >-
        Select results by specifying one or multiple of: study IDs/UUIDs,
        component IDs/UUIDs, batch IDs, group IDs, study result IDs, and
        component result IDs. You can use either **query parameters** or **JSON
        posted in the body**. Posting JSON is more flexible since it allows you
        to use single IDs, list of IDs, ranges, or a combination of all three.
        If one of the specified results does not exist or you have no permission
        to access it this result will simply be left out and no error will be
        raised. The results will be packed in an ZIP archive.
      tags: [ results ]
      parameters:
        - $ref: '#/components/parameters/StudyIdParameter'
        - $ref: '#/components/parameters/StudyUuidParameter'
        - $ref: '#/components/parameters/ComponentIdParameter'
        - $ref: '#/components/parameters/ComponentUuidParameter'
        - $ref: '#/components/parameters/StudyResultIdParameter'
        - $ref: '#/components/parameters/ComponentResultIdParameter'
        - $ref: '#/components/parameters/BatchIdParameter'
        - $ref: '#/components/parameters/GroupIdParameter'
      requestBody:
        $ref: '#/components/requestBodies/ResultIdsJsonBody'
      responses:
        '200':
          description: Success
          content:
            application/zip:
              schema:
                type: string
                description: ZIP archive containing the results (metadata, data, and files)
                format: binary
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"

  /jatos/api/v1/results/metadata:
    post:
      summary: Get result metadata as JSON
      description: >-
        Select results by specifying one or multiple of: study IDs/UUIDs,
        component IDs/UUIDs, batch IDs, group IDs, study result IDs, and
        component result IDs. You can use either **query parameters** or **JSON
        posted in the body**. Posting JSON is more flexible since it allows you
        to use single IDs, list of IDs, ranges, or a combination of all three.
        If one of the specified results does not exist or you have no permission
        to access it this result will simply be left out and no error will be
        raised.
      tags: [ results ]
      parameters:
        - in: query
          name: download
          required: false
          schema:
            type: boolean
            default: true
          description: If `true` the JSON is downloaded as a file; if `false` it's returned as JSON in the response body.
        - $ref: '#/components/parameters/StudyIdParameter'
        - $ref: '#/components/parameters/StudyUuidParameter'
        - $ref: '#/components/parameters/ComponentIdParameter'
        - $ref: '#/components/parameters/ComponentUuidParameter'
        - $ref: '#/components/parameters/StudyResultIdParameter'
        - $ref: '#/components/parameters/ComponentResultIdParameter'
        - $ref: '#/components/parameters/BatchIdParameter'
        - $ref: '#/components/parameters/GroupIdParameter'
      requestBody:
        $ref: '#/components/requestBodies/ResultIdsJsonBody'
      responses:
        '200':
          description: >-
            Returns JSON. If `download=true`, the same JSON is returned but with
            `Content-Disposition: attachment` so clients can download it as a file.
          headers:
            Content-Disposition:
              description: |
                Present when `download=true`. Suggests a filename and download.
              required: false
              schema:
                type: string
                example: attachment; filename="jatos_results_metadata_[datetime].json"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeResultsMetadata"
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"

  /jatos/api/v1/results/data:
    post:
      summary: Get only the data of results
      description: >-
        Select results by specifying one or multiple of: study IDs/UUIDs,
        component IDs/UUIDs, batch IDs, group IDs, study result IDs, and
        component result IDs. You can use either **query parameters** or **JSON
        posted in the body**. Posting JSON is more flexible since it allows you
        to use single IDs, list of IDs, ranges, or a combination of all three.
        If one of the specified results does not exist or you have no permission
        to access it this result will simply be left out and no error will be
        raised. If `asPlainText=true`, returns a single plain text stream
        (one line per result). Otherwise returns a ZIP archive containing one
        file per result.
      tags: [ results ]
      parameters:
        - in: query
          name: asPlainText
          required: false
          schema:
            type: boolean
            default: false
          description: If `true` return a single plain text stream; if `false` return ZIP.
        - $ref: '#/components/parameters/StudyIdParameter'
        - $ref: '#/components/parameters/StudyUuidParameter'
        - $ref: '#/components/parameters/ComponentIdParameter'
        - $ref: '#/components/parameters/ComponentUuidParameter'
        - $ref: '#/components/parameters/StudyResultIdParameter'
        - $ref: '#/components/parameters/ComponentResultIdParameter'
        - $ref: '#/components/parameters/BatchIdParameter'
        - $ref: '#/components/parameters/GroupIdParameter'
      requestBody:
        $ref: '#/components/requestBodies/ResultIdsJsonBody'
      responses:
        '200':
          description: Success
          headers:
            Content-Disposition:
              description: |
                Suggests a filename and download. Filesuffix can be .zip or .txt.
              required: true
              schema:
                type: string
                example: attachment; filename="jatos_results_data_[datetime].txt"
          content:
            text/plain:
              schema:
                type: string
                description: Plain text stream (one line per result) when `asPlainText=true`.
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"

  /jatos/api/v1/results/files:
    post:
      summary: Get only the files of results
      description: >-
        Select results by specifying one or multiple of: study IDs/UUIDs,
        component IDs/UUIDs, batch IDs, group IDs, study result IDs, and
        component result IDs. You can use either **query parameters** or **JSON
        posted in the body**. Posting JSON is more flexible since it allows you
        to use single IDs, list of IDs, ranges, or a combination of all three.
        If one of the specified results does not exist or you have no permission
        to access it this result will simply be left out and no error will be
        raised. The results will be packed in a ZIP archive.
      tags: [ results ]
      parameters:
        - $ref: '#/components/parameters/StudyIdParameter'
        - $ref: '#/components/parameters/StudyUuidParameter'
        - $ref: '#/components/parameters/ComponentIdParameter'
        - $ref: '#/components/parameters/ComponentUuidParameter'
        - $ref: '#/components/parameters/StudyResultIdParameter'
        - $ref: '#/components/parameters/ComponentResultIdParameter'
        - $ref: '#/components/parameters/BatchIdParameter'
        - $ref: '#/components/parameters/GroupIdParameter'
      requestBody:
        $ref: '#/components/requestBodies/ResultIdsJsonBody'
      responses:
        '200':
          description: Success
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"

  /jatos/api/v1/results/files/{filename}:
    get:
      summary: Get a single result file
      tags: [ results ]
      parameters:
        - in: query
          name: componentResultId
          required: true
          schema:
            type: integer
            minimum: 1
          description: Component result ID
        - in: path
          name: filename
          required: true
          schema:
            type: string
          description: Name of the file to be fetched
      responses:
        '200':
          description: Success
          content:
            '*':
              schema:
                type: string
                format: binary
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /jatos/api/v1/results/delete:
    put:
      summary: Delete results
      description: >-
        **Delete results (including data, metadata and files)** by specifying
        one or multiple of: study IDs/UUIDs, component IDs/UUIDs, batch IDs,
        group IDs, study result IDs, and component result IDs. You can  use
        either **query parameters** or **JSON posted in the body**. Posting JSON
        is more flexible since it allows you to use single IDs, list of IDs,
        ranges, or a combination of all three. If one of the specified results
        does not exist or you have no permission to access it this result will
        simply be left out and no error will be raised. Empty study results will
        be deleted too. **Only results will be deleted, studies, components,
        batches, and groups remain untouched**. **This cannot be undone**.
        Response contains the deleted component result IDs in an envelope.
      tags: [ results ]
      parameters:
        - $ref: '#/components/parameters/StudyIdParameter'
        - $ref: '#/components/parameters/StudyUuidParameter'
        - $ref: '#/components/parameters/ComponentIdParameter'
        - $ref: '#/components/parameters/ComponentUuidParameter'
        - $ref: '#/components/parameters/StudyResultIdParameter'
        - $ref: '#/components/parameters/ComponentResultIdParameter'
        - $ref: '#/components/parameters/BatchIdParameter'
        - $ref: '#/components/parameters/GroupIdParameter'
      requestBody:
        $ref: '#/components/requestBodies/ResultIdsJsonBody'
      responses:
        '200':
          description: Deleted component result IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeDeletedComponentResultIds"
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"

security:
  - BearerAuth: [ ]

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  parameters:
    StudyIdOrUuidParameter:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Either a study ID or a study UUID
    StudyIdParameter:
      in: query
      name: studyId
      schema:
        type: array
        items:
          type: integer
      style: form
      explode: true
      description: >-
        Specify results with a study ID. This query parameter can be used
        multiple times.
    StudyUuidParameter:
      in: query
      name: studyUuid
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true
      description: >-
        Specify results with a study UUID. This query parameter can be used
        multiple times.
    ComponentIdOrUuidParameter:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Either a component ID or a component UUID
    ComponentIdParameter:
      in: query
      name: componentId
      schema:
        type: array
        items:
          type: integer
      style: form
      explode: true
      description: >-
        Specify results with a component ID. This query parameter can be used
        multiple times.
    ComponentUuidParameter:
      in: query
      name: componentUuid
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true
      description: >-
        Specify results with a component UUID. This query parameter can be used
        multiple times.
    StudyResultIdParameter:
      in: query
      name: studyResultId
      schema:
        type: array
        items:
          type: integer
      style: form
      explode: true
      description: >-
        Specify results with a study result ID. This query parameter can be used
        multiple times.
    ComponentResultIdParameter:
      in: query
      name: componentResultId
      schema:
        type: array
        items:
          type: integer
      style: form
      explode: true
      description: >-
        Specify results with a component result ID. This query parameter can be
        used multiple times.
    BatchIdOrUuidParameter:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Either a batch ID or batch UUID
    BatchIdParameter:
      in: query
      name: batchId
      schema:
        type: array
        items:
          type: integer
      style: form
      explode: true
      description: >-
        Specify results with a batch ID. This query parameter can be used
        multiple times.
    GroupIdParameter:
      in: query
      name: groupId
      schema:
        type: array
        items:
          type: integer
      style: form
      explode: true
      description: >-
        Specify results with a group ID. This query parameter can be used
        multiple times.


  requestBodies:
    ResultIdsJsonBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              studyIds:
                oneOf:
                  - type: array
                    items:
                      type: integer
                  - type: integer
                  - type: string
              studyUuids:
                oneOf:
                  - type: array
                    items:
                      type: string
                  - type: string
              componentIds:
                oneOf:
                  - type: array
                    items:
                      type: integer
                  - type: integer
                  - type: string
              componentUuids:
                oneOf:
                  - type: array
                    items:
                      type: string
                  - type: string
              componentResultIds:
                oneOf:
                  - type: array
                    items:
                      type: integer
                  - type: integer
                  - type: string
              studyResultIds:
                oneOf:
                  - type: array
                    items:
                      type: integer
                  - type: integer
                  - type: string
              batchIds:
                oneOf:
                  - type: array
                    items:
                      type: integer
                  - type: integer
                  - type: string
              groupIds:
                oneOf:
                  - type: array
                    items:
                      type: integer
                  - type: integer
                  - type: string
          examples:
            studyIds:
              summary: Study ID
              value:
                studyIds: 1
            studyUuids:
              summary: Study UUID
              value:
                studyUuids: 11111111-1111-1111-1111-111111111111
            componentIds:
              summary: Component ID
              value:
                componentIds: 1
            componentUuids:
              summary: Component UUID
              value:
                componentUuids: 11111111-1111-1111-1111-111111111111
            listOfComponentIds:
              summary: Multiple component IDs
              value:
                componentIds:
                  - 1
                  - 2
                  - 3
            listOfComponentUuids:
              summary: Multiple component UUIDs
              value:
                componentUuids:
                  - 11111111-1111-1111-1111-111111111111
                  - 22222222-2222-2222-2222-222222222222
                  - 33333333-3333-3333-3333-333333333333
            batchIds:
              summary: Batch ID
              value:
                batchIds: 1
            groupIds:
              summary: Group ID
              value:
                groupIds: 1
            listOfComponentResultIds:
              summary: Multiple component result IDs
              value:
                componentResultIds:
                  - 1
                  - 2
                  - 3
            rangeOfComponentResultIds:
              summary: Range of component result IDs
              value:
                componentResultIds: 1-10
            mixOfComponentResultIds:
              summary: Mix of ranges and single component result IDs
              value:
                componentResultIds: 1-10, 12, 15, 20-30
            listOfStudyResultIds:
              summary: Multiple study result IDs
              value:
                studyResultIds:
                  - 1
                  - 2
                  - 3
            rangeOfStudyResultIds:
              summary: Range of Study result IDs
              value:
                studyResultIds: 1-10
            mixOfStudyResultIds:
              summary: Mix of ranges and single study result IDs
              value:
                studyResultIds: 1-10, 12, 15, 20-30
            combinationOfAll:
              summary: All
              value:
                studyIds: 1
                studyUuids: 11111111-1111-1111-1111-111111111111
                componentIds: 1
                componentUuids: 11111111-1111-1111-1111-111111111111
                componentResultIds: 1
                studyResultIds: 1
                batchIds: 1
                groupIds: 1

  responses:
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelopeError"

    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelopeError"

    NotFoundError:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelopeError"

    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelopeError"

  schemas:
    ApiEnvelopeSuccess:
      type: object
      properties:
        apiVersion:
          type: string
        message:
          type: string
      required: [ apiVersion ]
      additionalProperties: false

    ApiEnvelopeError:
      type: object
      properties:
        apiVersion:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - INVALID_REQUEST
                - INVALID_JSON
                - INVALID_AUTH_METHOD
                - NOT_FOUND
                - IMPORT_EXPORT_ERROR
                - AUTH_ERROR
                - NO_ACCESS
                - LDAP_ERROR
                - FORBIDDEN
                - CONFIG_ERROR
                - WRONG_CONTENT_TYPE
                - MISSING_FILE
                - IO_ERROR
                - STUDY_LOCKED
                - TOO_LARGE
                - CLIENT_ERROR
                - UNSPECIFIED
                - UNEXPECTED_ERROR
            message:
              type: string
          required: [ code ]
          additionalProperties: false
      required: [ apiVersion, error ]
      additionalProperties: false

    ComponentRef:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
      required: [ id, uuid ]
      additionalProperties: false

    BatchRef:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
      required: [ id, uuid ]
      additionalProperties: false

    StudyMemberRef:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
      required: [ id, username ]
      additionalProperties: false

    DirectoryEntry:
      type: object
      description: >-
        A single node in the study assets directory listing.
        When `flatten=false`, the response is a tree and directories may have `content`.
        When `flatten=true`, the response is a flat array of leaf nodes.
      properties:
        name:
          type: string
          description: File or directory name (last path segment).
        path:
          type: string
          description: Path relative to the study assets base directory.
          example: images/logo.png
        type:
          type: string
          description: Node type as detected from the filesystem.
          enum: [ directory, file, other ]
        creation:
          type: integer
          format: int64
          description: Creation timestamp in milliseconds since epoch.
        lastModified:
          type: integer
          format: int64
          description: Last modification timestamp in milliseconds since epoch.
        size:
          type: integer
          format: int64
          description: Size in bytes (for directories this can be filesystem-dependent).
        checksum:
          type: integer
          format: int64
          nullable: true
          description: Adler32 checksum; present only for regular files.
        content:
          type: array
          nullable: true
          description: Directory contents (present only when this node is a directory and `flatten=false`).
          items:
            $ref: '#/components/schemas/DirectoryEntry'
      required: [ name, path, type, creation, lastModified, size ]
      additionalProperties: false

    BatchOrGroupSession:
      type: object
      description: >-
        Temporary, global data storage for a batch or group (JSON stored as string) plus a version for
        optimistic concurrency control.
      properties:
        version:
          type: integer
          format: int64
        data:
          type: string
          description: Batch/group session data (string containing JSON).
      required: [ version, data ]
      additionalProperties: false

    ApiTokenMetadata:
      type: object
      description: API token metadata (token value is never returned).
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        userId:
          type: integer
          format: int64
          nullable: true
        creationDate:
          type: string
          format: date-time
          nullable: true
          description: Token creation timestamp.
        expiresAfter:
          type: integer
          nullable: true
          description: Expiration time in seconds after creation. Null or <= 0 means no expiration.
        expirationDate:
          type: string
          format: date-time
          nullable: true
          description: Calculated expiration timestamp.
        isExpired:
          type: boolean
        isAdminToken:
          type: boolean
        active:
          type: boolean
      required: [ id, isExpired, isAdminToken, active ]

    ApiTokenWithValue:
      description: Generated token (token value is returned only on creation).
      allOf:
        - $ref: '#/components/schemas/ApiTokenMetadata'
        - type: object
          properties:
            token:
              type: string
              description: The generated token value. Returned only once at creation time.
          required: [ token ]

    AdminStatusLatestUser:
      type: object
      properties:
        username:
          type: string
        name:
          type: string
        authMethod:
          type: string
        time:
          type: string
          format: date-time
          description: ISO-8601 timestamp string.
      required: [ username, name, authMethod, time ]

    AdminStatusLatestStudyRunMember:
      type: object
      properties:
        username:
          type: string
        name:
          type: string
        authMethod:
          type: string
      required: [ username, name, authMethod ]

    AdminStatusLatestStudyRun:
      type: object
      properties:
        studyTitle:
          type: string
        time:
          description: Timestamp as returned by the server (may be a JSON datetime or numeric timestamp).
          oneOf:
            - type: string
              format: date-time
            - type: integer
              format: int64
        members:
          type: array
          items:
            $ref: '#/components/schemas/AdminStatusLatestStudyRunMember'
      required: [ studyTitle, time, members ]

    AdminStatus:
      type: object
      description: Admin status information.
      properties:
        studyCount:
          type: integer
        studyCountTotal:
          type: integer
        studyResultCount:
          type: integer
        studyResultCountTotal:
          type: integer
        workerCount:
          type: integer
        workerCountTotal:
          type: integer
        userCount:
          type: integer
        serverTime:
          type: integer
          format: int64
          description: Server time in milliseconds since epoch.
        latestUsers:
          type: array
          items:
            $ref: '#/components/schemas/AdminStatusLatestUser'
        latestStudyRuns:
          type: array
          items:
            $ref: '#/components/schemas/AdminStatusLatestStudyRun'
      required:
        - studyCount
        - studyCountTotal
        - studyResultCount
        - studyResultCountTotal
        - workerCount
        - workerCountTotal
        - userCount
        - serverTime
        - latestUsers
        - latestStudyRuns

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        name:
          type: string
        email:
          type: string
          nullable: true
        roleList:
          type: array
          items:
            type: string
            enum: [ USER, ADMIN, SUPERUSER ]
        authMethod:
          type: string
          enum: [ DB, LDAP, OAUTH_GOOGLE, OIDC, ORCID, SRAM, CONEXT ]
        lastSignin:
          type: string
          format: date-time
          nullable: true
        lastSeen:
          type: string
          format: date-time
          nullable: true
        active:
          type: boolean
      required: [ id, username, name, roleList, authMethod, active ]

    UserWithStudyIds:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            studyIds:
              type: array
              items:
                type: integer
                format: int64
          required: [ studyIds ]

    StudyActiveToggled:
      type: object
      description: Minimal response payload when only the study's 'active' flag is toggled.
      properties:
        id:
          type: integer
          format: int64
          description: Study ID.
        uuid:
          type: string
          description: Study UUID.
        active:
          type: boolean
          description: Current activation status.
      required: [ id, uuid, active ]
      additionalProperties: false

    Study:
      type: object
      description: Study properties. Includes components, batches, and members.
      properties:
        id:
          type: integer
          format: int64
          description: The ID of the study.
        uuid:
          type: string
          description: The UUID identifier for the study.
        title:
          type: string
          description: Title of the study
        description:
          type: string
          nullable: true
          description: Description of the study
        locked:
          type: boolean
          description: Is the study locked
        active:
          type: boolean
          description: Is the study activated
        groupStudy:
          type: boolean
          description: Is the study a group study
        linearStudy:
          type: boolean
          description: Is the study a linear study
        allowPreview:
          type: boolean
          description: Are previews allowed
        components:
          type: array
          description: >-
            Study components. Depending on the endpoint/flags this can be a minimal reference
            object (id/uuid) or full component objects.
          items:
            oneOf:
              - $ref: '#/components/schemas/ComponentRef'
              - $ref: '#/components/schemas/Component'
        batches:
          type: array
          description: >-
            Study batches. Depending on the endpoint/flags this can be a minimal reference
            object (id/uuid) or full batch objects.
          items:
            oneOf:
              - $ref: '#/components/schemas/BatchRef'
              - $ref: '#/components/schemas/Batch'
        dirName:
          type: string
          description: Directory name of the study assets
        comments:
          type: string
          nullable: true
          description: Some comments
        jsonData:
          type: string
          description: Study input in JSON format
        endRedirectUrl:
          type: string
          nullable: true
          description: URL the study redirects to after it is finished
        studyEntryMsg:
          type: string
          nullable: true
          description: Message shown to the user when starting the study via the study entry page
        members:
          type: array
          items:
            $ref: '#/components/schemas/StudyMemberRef'
      required: [ id, uuid, title, locked, active, groupStudy, linearStudy, allowPreview, dirName, members, components, batches ]
      additionalProperties: false

    Component:
      type: object
      description: Component properties.
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
        title:
          type: string
        htmlFilePath:
          type: string
          nullable: true
          description: Local path to component's HTML file in the study assets folder.
        reloadable:
          type: boolean
        active:
          type: boolean
        comments:
          type: string
          nullable: true
        jsonData:
          type: string
          description: Component input in JSON format
      required: [ id, uuid, title, reloadable, active ]
      additionalProperties: false

    Batch:
      type: object
      description: Batch properties.
      properties:
        id:
          type: integer
          format: int64
          description: Batch ID.
        uuid:
          type: string
          description: Batch UUID.
        title:
          type: string
          nullable: true
          description: Title of the batch.
        active:
          type: boolean
          description: Whether this batch is active.
          default: true
        maxActiveMembers:
          type: integer
          nullable: true
          description: Max active members per group (only relevant for group studies). 'null' means no limit.
        maxTotalMembers:
          type: integer
          nullable: true
          description: Max total members per group (only relevant for group studies). 'null' means no limit.
        maxTotalWorkers:
          type: integer
          nullable: true
          description: Max total workers in the batch (independent of groups). 'null' means no limit.
        allowedWorkerTypes:
          type: array
          description: Types allowed to run in this batch.
          items:
            type: string
        comments:
          type: string
          nullable: true
          description: User comments.
        jsonData:
          type: string
          description: Batch input data in JSON format.
      required: [ id, uuid, active, allowedWorkerTypes ]
      additionalProperties: false

    Group:
      type: object
      description: Group information
      properties:
        id:
          type: integer
          format: int64
        groupState:
          type: string
          enum: [ STARTED, FINISHED, FIXED ]
        activeMemberList:
          type: array
          description: List of active member studyResult IDs.
          items:
            type: integer
            format: int64
        historyMemberList:
          type: array
          description: List of past member studyResult IDs.
          items:
            type: integer
            format: int64
        activeMemberCount:
          type: integer
          nullable: true
        historyMemberCount:
          type: integer
          nullable: true
        resultCount:
          type: integer
          description: activeMemberCount + historyMemberCount
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
      required: [ id, activeMemberList, historyMemberList, resultCount ]
      additionalProperties: false

    StudyMembers:
      type: object
      description: Study identifier plus the list of member user IDs.
      properties:
        id:
          type: integer
          format: int64
          description: Study ID.
        uuid:
          type: string
          description: Study UUID.
        members:
          type: array
          description: List of user IDs that are members of this study.
          items:
            type: integer
            format: int64
      required: [ id, uuid, members ]
      additionalProperties: false

    StudyCodeInfo:
      type: object
      description: Information about a study code.
      properties:
        studyCode:
          type: string
        batchId:
          type: integer
          format: int64
        type:
          type: string
        comment:
          type: string
          nullable: true
        active:
          type: boolean
        studyLinkPath:
          type: string
        studyEntryPath:
          type: string
      required: [ studyCode, batchId, type, active, studyLinkPath, studyEntryPath ]
      additionalProperties: false

    UserCreate:
      type: object
      properties:
        username:
          type: string
          description: Username of the new user
        name:
          type: string
          description: Name of the new user
        email:
          type: string
          description: Email address of the new user
        password:
          type: string
          description: Password of the new user (only for authMethod DB)
        authMethod:
          type: string
          enum: [ DB, LDAP ]
          description: Authentication method
      required:
        - username
        - name
        - authMethod

    UserUpdate:
      type: object
      description: >-
        Partial update of a user. Provide only the fields you want to change.
      properties:
        name:
          type: string
          description: Name of the user
        email:
          type: string
          nullable: true
          description: Email address of the user
        password:
          type: string
          description: New password (only applicable for authMethod DB)
        active:
          type: boolean
          description: Whether the user is active
      additionalProperties: false

    StudyCreate:
      allOf:
        - $ref: '#/components/schemas/StudyPropertiesUpdate'
        - type: object
          required:
            - title

    StudyPropertiesUpdate:
      type: object
      properties:
        title:
          type: string
          description: Title of the study
        description:
          type: string
          nullable: true
          description: Description of the study
        active:
          type: boolean
          description: A deactivated study cannot be run by a worker.
          default: true
        groupStudy:
          type: boolean
          default: false
          description: Is the study a group study
        linearStudy:
          type: boolean
          default: false
          description: Is the study a linear study
        allowPreview:
          type: boolean
          default: false
          description: Are previews allowed
        dirName:
          type: string
          deprecated: true
          description: >-
            **Optional** study assets directory name. If omitted, the server uses the study **UUID**.
            **Recommended: omit this field unless you have a specific reason to control the directory name.**
        comments:
          type: string
          nullable: true
          description: Some comments
        jsonData:
          nullable: true
          description: Study input in JSON format, either as a JSON string or as a JSON object.
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        endRedirectUrl:
          type: string
          nullable: true
          description: URL the study redirects to after it is finished
        studyEntryMsg:
          type: string
          nullable: true
          description: Message shown to the user when starting the study via the study entry page
      additionalProperties: false

    StudyPropertiesUpdateActiveOnly:
      type: object
      properties:
        active:
          type: boolean
          description: A deactivated study cannot be run by a worker.
          default: true
      additionalProperties: false
      required: [ active ]

    ComponentUpsert:
      type: object
      properties:
        title:
          type: string
          description: Component title.
        htmlFilePath:
          type: string
          nullable: true
          description: Local path to component's HTML file in the study assets folder.
        reloadable:
          type: boolean
          default: false
          description: Is the component reloadable.
        active:
          type: boolean
          default: true
          description: Whether the component is active.
        comments:
          type: string
          nullable: true
          description: User comments.
        jsonData:
          description: Component input in JSON format (either JSON string or JSON object).
          nullable: true
          oneOf:
            - type: string
            - type: object
              additionalProperties: true

    ComponentCreate:
      allOf:
        - $ref: "#/components/schemas/ComponentUpsert"
        - type: object
          required:
            - title
      additionalProperties: false

    ComponentUpdate:
      description: Component properties update payload.
      allOf:
        - $ref: "#/components/schemas/ComponentUpsert"
        - type: object
          properties:
            htmlFileRename:
              type: boolean
              description: Whether the actual HTML file on disk should be renamed.
              default: false
      additionalProperties: false

    CreateBatch:
      allOf:
        - $ref: '#/components/schemas/UpdateBatch'
        - type: object
          required:
            - title

    UpdateBatch:
      type: object
      description: >-
        Batch properties payload used to create or update a batch.
      properties:
        title:
          type: string
          description: Title of the batch.
        active:
          type: boolean
          default: true
          description: true if batch can be used.
        maxActiveMembers:
          type: integer
          nullable: true
          description: Maximum number of active members in one group. 'null' means no limit.
        maxTotalMembers:
          type: integer
          nullable: true
          description: Maximum number of members (active or inactive) in one group. 'null' means no limit.
        maxTotalWorkers:
          type: integer
          nullable: true
          minimum: 1
          description: Maximum number of workers in this batch (independent of groups). 'null' means no limit.
        allowedWorkerTypes:
          type: array
          description: Set of types that are allowed to run in this batch.
          items:
            type: string
          default: [ ]
        comments:
          type: string
          nullable: true
          description: User comments.
        jsonData:
          nullable: true
          description: Batch input in JSON format, either as a JSON string or as a JSON object.
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
      additionalProperties: false

    ResultsMetadataComponentResultList:
      type: object
      properties:
        id:
          type: integer
          format: int64
        componentId:
          type: integer
          format: int64
        componentUuid:
          type: string
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        duration:
          type: string
          nullable: true
          description: Human-readable duration (derived from start/end).
        componentState:
          type: string
          enum: [ STARTED, DATA_RETRIEVED, RESULTDATA_POSTED, FINISHED, RELOADED, ABORTED, FAIL ]
        path:
          type: string
          description: Path to the result files if applicable.
        data:
          properties:
            size:
              type: integer
              format: int64
            sizeHumanReadable:
              type: string
            filename:
              type: string
              description: Filename of the data file if applicable.
          required: [ size, sizeHumanReadable ]
          additionalProperties: false
        files:
          type: array
          description: Paths to the result files
          items:
            type: object
            additionalProperties: true
        isQuotaReached:
          type: boolean
      required: [ id, componentId, componentUuid, componentState, data, isQuotaReached ]
      additionalProperties: false

    ResultsMetadataStudyResultList:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
        studyCode:
          type: string
        comment:
          type: string
          nullable: true
          description: Only present if worker comment is non-empty.
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        duration:
          type: string
          nullable: true
          description: Human-readable duration (derived from start/end).
        lastSeenDate:
          type: string
          format: date-time
          nullable: true
        studyState:
          type: string
          enum: [ PRE, STARTED, DATA_RETRIEVED, FINISHED, ABORTED, FAIL ]
        message:
          type: string
          nullable: true
        urlQueryParameters:
          type: object
          additionalProperties:
            type: string
          nullable: true
        workerId:
          type: integer
          format: int64
        workerType:
          type: string
        batchId:
          type: integer
          format: int64
        batchUuid:
          type: string
        batchTitle:
          type: string
          nullable: true
        groupId:
          type: integer
          format: int64
          nullable: true
        confirmationCode:
          type: string
          nullable: true
          description: Present only MTurk type
        isQuotaReached:
          type: boolean
        componentResults:
          type: array
          items:
            $ref: "#/components/schemas/ResultsMetadataComponentResultList"
      required: [ id, uuid, studyCode, studyState, workerId, workerType, batchId, batchUuid, isQuotaReached, componentResults ]
      additionalProperties: false

