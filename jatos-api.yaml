  /jatos/api/v1/studies/{id}/studyCodes:
    get:
      deprecated: true
      summary: Deprecated - use POST /studyCodes instead
      tags: [ study-runs ]
      responses:
        '200':
          description: Success
    post:
      summary: Get one or multiple study codes
      description: >-
        Parameters can be provided either via query parameters
        or via a JSON request body. At least `type` must be provided (in query or body).
      tags: [ study-runs ]
      parameters:
        - $ref: '#/components/parameters/StudyIdOrUuidParameter'
        - in: query
          name: type
          required: false
          schema:
            type: string
          description: >-
            Type. Provide either here or in JSON body. One of `PersonalSingle` (or `ps`), `PersonalMultiple` (or
            `pm`), `GeneralSingle` (or `gs`), `GeneralMultiple` (or `gm`), `MTurk` (or `mt`)
        - in: query
          name: batchId
          required: false
          schema:
            type: integer
            minimum: 1
          description: >-
            Batch ID. Optional. ID of the batch to which the study codes should belong to. If not
            set the default batch is used.
        - in: query
          name: comment
          required: false
          schema:
            type: string
          description: >-
            Optional comment associated with the worker/study code. Only for type `PersonalSingle`
            or `PersonalMultiple`).
        - in: query
          name: amount
          required: false
          schema:
            type: integer
          description: >-
            Number of study codes to be generated. Only for type `PersonalSingle`
            or `PersonalMultiple`). Default is 1.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                batchId:
                  type: integer
                  minimum: 1
                  description: >-
                    Batch ID. Optional. ID of the batch to which the study codes should belong to. If not
                    set the default batch is used.
                type:
                  type: string
                  description: >-
                    Type. Provide either here or in JSON body. One of `PersonalSingle` (or `ps`), `PersonalMultiple` (or
                    `pm`), `GeneralSingle` (or `gs`), `GeneralMultiple` (or `gm`), `MTurk` (or `mt`)
                comment:
                  type: string
                  description: >-
                    Optional comment associated with the worker/study code. Only for type `PersonalSingle`
                    or `PersonalMultiple`).
                amount:
                  type: integer
                  minimum: 1
                  description: >-
                    Number of study codes to be generated. Only for type `PersonalSingle`
                    or `PersonalMultiple`). Default is 1.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - apiVersion
                  - data
                properties:
                  apiVersion:
                    type: string
                  data:
                    type: array
                    items:
                      type: string
                additionalProperties: false
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          $ref: "#/components/responses/UnauthorizedError"
        '403':
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

